document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

v data-reveal=\"\" style=\"transition:opacity .7s ease,transform .7s ease;max-width:1320px;margin:0 auto;padding:100px 30px\">\n    <span style=\"font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:#3b6dff;font-weight:700\">004 — Manifesto<\u002Fspan>\n    <p style=\"font-weight:600;font-size:clamp(26px,4vw,52px);line-height:1.18;letter-spacing:-.02em;margin:30px 0 0;max-width:1040px;text-wrap:pretty\">mood is a clothing label built by two 14-year-olds. No factory floor, no boardroom — two friends making pieces we'd actually wear. Every design drops in small numbers, then it's gone. <span style=\"color:#3b6dff\">Wear your mood.<\u002Fspan><\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ DROP + COUNTDOWN ============ -->\n<section id=\"drop\" data-screen-label=\"drop\" style=\"max-width:1320px;margin:0 auto;padding:100px 30px\">\n  <div data-reveal=\"\" style=\"transition:opacity .7s ease,transform .7s ease;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:50px;align-items:center\">\n    <div>\n      <span style=\"font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:#3b6dff;font-weight:700\">005 — First Drop<\u002Fspan>\n      <h2 style=\"font-weight:900;letter-spacing:-.03em;text-transform:uppercase;font-size:clamp(44px,6vw,80px);line-height:.92;margin:18px 0 0\">{{ dropName }}<\u002Fh2>\n      <p style=\"color:#a9a69f;margin:22px 0 0;max-width:420px;font-size:15px;text-wrap:pretty\">Our debut piece is in the works — designed by us, made in a small run. Join the list and be first when it drops.<\u002Fp>\n      <div style=\"display:flex;gap:0;margin-top:40px;border-top:1px solid rgba(255,255,255,.14);border-bottom:1px solid rgba(255,255,255,.14)\">\n        <div style=\"flex:1;padding:22px 6px;text-align:center;border-right:1px solid rgba(255,255,255,.14)\">\n          <div style=\"font-weight:900;font-size:clamp(32px,5vw,46px);line-height:1;letter-spacing:-.02em\">{{ cd.d }}<\u002Fdiv>\n          <div style=\"font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:#8f8c85;margin-top:8px;font-weight:700\">Days<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;padding:22px 6px;text-align:center;border-right:1px solid rgba(255,255,255,.14)\">\n          <div style=\"font-weight:900;font-size:clamp(32px,5vw,46px);line-height:1;letter-spacing:-.02em\">{{ cd.h }}<\u002Fdiv>\n          <div style=\"font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:#8f8c85;margin-top:8px;font-weight:700\">Hrs<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;padding:22px 6px;text-align:center;border-right:1px solid rgba(255,255,255,.14)\">\n          <div style=\"font-weight:900;font-size:clamp(32px,5vw,46px);line-height:1;letter-spacing:-.02em\">{{ cd.m }}<\u002Fdiv>\n          <div style=\"font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:#8f8c85;margin-top:8px;font-weight:700\">Min<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;padding:22px 6px;text-align:center\">\n          <div style=\"font-weight:900;font-size:clamp(32px,5vw,46px);line-height:1;letter-spacing:-.02em\">{{ cd.s }}<\u002Fdiv>\n          <div style=\"font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:#8f8c85;margin-top:8px;font-weight:700\">Sec<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.1)\">\n      <span style=\"position:absolute;top:20px;left:20px;z-index:2;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:#f2efe8;font-weight:700;mix-blend-mode:difference\">Fig.03 — Back<\u002Fspan>\n      <img src=\"8095413c-641a-4136-84f0-7285ccf52fea\" alt=\"snow washed hoodie — back\" style=\"width:100%;aspect-ratio:4/5;object-fit:cover;object-position:70% 35%;display:block\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ CTA ============ -->\n<section id=\"notify\" data-screen-label=\"notify\" style=\"border-top:1px solid rgba(255,255,255,.1)\">\n  <div data-reveal=\"\" style=\"transition:opacity .7s ease,transform .7s ease;max-width:1320px;margin:0 auto;padding:110px 30px;text-align:center\">\n    <span style=\"font-size:13px;letter-spacing:.3em;text-transform:uppercase;color:#3b6dff;font-weight:700\">mood<\u002Fspan>\n    <h2 style=\"font-weight:900;letter-spacing:-.03em;text-transform:uppercase;font-size:clamp(40px,7vw,96px);line-height:.9;margin:20px 0 0\">Don't miss<br>the drop<\u002Fh2>\n    <p style=\"color:#a9a69f;margin:22px auto 0;max-width:400px;font-size:15px;text-wrap:pretty\">Drops are small and they go fast. Get the drop notice the moment {{ dropName }} is live.<\u002Fp>\n    <form onsubmit=\"{{ submitCta }}\" style=\"display:flex;gap:0;margin:40px auto 0;max-width:460px;border-bottom:1px solid rgba(255,255,255,.28)\">\n      <input type=\"email\" placeholder=\"Email address\" required=\"\" style=\"flex:1;min-width:180px;background:transparent;border:none;color:#f2efe8;padding:14px 2px;font-size:15px;font-family:inherit;outline:none;text-align:left\">\n      <button type=\"submit\" style=\"font-weight:700;font-size:12px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:#3b6dff;padding:0 4px\">Join →<\u002Fbutton>\n    <\u002Fform>\n    <p style=\"font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#3b6dff;font-weight:600;margin-top:16px;min-height:16px\">{{ ctaNote }}<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FOOTER ============ -->\n<footer style=\"border-top:1px solid rgba(255,255,255,.1)\">\n  <div style=\"max-width:1320px;margin:0 auto;padding:44px 30px 60px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:22px\">\n    <a href=\"#top\" style=\"display:inline-flex;align-items:baseline;gap:11px;text-decoration:none;color:#f2efe8\">\n      <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:21px;letter-spacing:-.01em;text-transform:uppercase\">mood<span style=\"color:#3b6dff\">.<\u002Fspan><\u002Fspan>\n    <\u002Fa>\n    <div style=\"display:flex;gap:26px\">\n      <a href=\"#\" aria-label=\"Instagram\" style=\"font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#a9a69f;text-decoration:none;font-weight:600\" style-hover=\"color:#3b6dff\">Instagram<\u002Fa>\n      <a href=\"#\" aria-label=\"TikTok\" style=\"font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#a9a69f;text-decoration:none;font-weight:600\" style-hover=\"color:#3b6dff\">TikTok<\u002Fa>\n      <a href=\"mailto:hello@example.com\" style=\"font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#a9a69f;text-decoration:none;font-weight:600\" style-hover=\"color:#3b6dff\">Email<\u002Fa>\n    <\u002Fdiv>\n    <p style=\"color:#57534b;font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;width:100%;margin:0\">© {{ year }} mood — made by teens, for teens<\u002Fp>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;showKanjiBg&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Style&quot;},&quot;dropName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Drop 01&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Content&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    cd: { d: '00', h: '00', m: '00', s: '00' },\n    heroNote: \"Be first to see drop 01 — no spam.\",\n    ctaNote: \"\"\n  };\n  headerRef = React.createRef();\n\n  componentDidMount() {\n    this._onScroll = () => {\n      const s = window.scrollY > 20;\n      const h = this.headerRef.current;\n      if (h) {\n        h.style.background = s ? 'rgba(12,12,12,.92)' : 'linear-gradient(180deg, rgba(12,12,12,.65), rgba(12,12,12,0))';\n        h.style.borderBottomColor = s ? 'rgba(255,255,255,.1)' : 'transparent';\n      }\n    };\n    window.addEventListener('scroll', this._onScroll);\n    this._onScroll();\n\n    const revealEls = [...document.querySelectorAll('[data-reveal]')];\n    revealEls.forEach(el => { el.style.opacity = '0'; el.style.transform = 'translateY(24px)'; });\n    this._revealCheck = () => {\n      revealEls.forEach(el => {\n        if (el.getBoundingClientRect().top < window.innerHeight * 0.88) {\n          el.style.opacity = '1'; el.style.transform = 'none';\n        }\n      });\n    };\n    this._revealCheck();\n    window.addEventListener('scroll', this._revealCheck, { passive: true });\n    window.addEventListener('resize', this._revealCheck, { passive: true });\n\n    // wash colorway switcher\n    const washImg = document.querySelector('[data-wash-img]');\n    if (washImg) {\n      const washMap = { black: washImg.getAttribute('src') };\n      const washNames = { black: 'Washed Black', grey: 'Washed Grey', plum: 'Plum', maroon: 'Maroon' };\n      document.querySelectorAll('[data-wash-src]').forEach(h => { washMap[h.getAttribute('data-wash-src')] = h.getAttribute('src'); });\n      const washSw = [...document.querySelectorAll('[data-wash]')];\n      const washLabel = document.querySelector('[data-wash-label]');\n      const pickWash = (sw) => {\n        const c = sw.getAttribute('data-wash');\n        if (washMap[c]) {\n          washImg.style.opacity = '0';\n          const pre = new Image();\n          const apply = () => { washImg.src = washMap[c]; washImg.style.opacity = '1'; };\n          pre.onload = apply; pre.onerror = apply;\n          pre.src = washMap[c];\n        }\n        washSw.forEach(s => { s.style.boxShadow = (s === sw) ? '0 0 0 2px #3b6dff' : 'none'; });\n        if (washLabel) washLabel.textContent = washNames[c] + ' · S–2XL';\n        washImg.dataset.flipped = '';\n        if (washImg.dataset.flipBasePos) washImg.style.objectPosition = washImg.dataset.flipBasePos;\n        const flipChip = washImg.parentElement.querySelector('[data-flip-chip]');\n        if (flipChip) flipChip.textContent = 'Tap for back';\n      };\n      washSw.forEach(sw => {\n        sw.addEventListener('click', () => pickWash(sw));\n        sw.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); pickWash(sw); } });\n      });\n    }\n\n    // front/back flip on collection cards\n    document.querySelectorAll('img[data-flip]').forEach((img) => {\n      const box = img.parentElement;\n      const backEl = box.querySelector('[data-flip-src]');\n      const chip = box.querySelector('[data-flip-chip]');\n      if (!backEl) return;\n      const basePos = getComputedStyle(img).objectPosition;\n      img.dataset.flipBasePos = basePos;\n      const fade = (src) => {\n        img.style.opacity = '0';\n        const pre = new Image();\n        const apply = () => { img.src = src; img.style.opacity = '1'; };\n        pre.onload = apply; pre.onerror = apply;\n        pre.src = src;\n      };\n      const toggle = () => {\n        if (img.dataset.flipped === '1') {\n          img.dataset.flipped = '';\n          img.style.objectPosition = img.dataset.flipBasePos || '';\n          fade(img.dataset.frontSrc);\n          if (chip) chip.textContent = 'Tap for back';\n        } else {\n          img.dataset.frontSrc = img.getAttribute('src');\n          img.dataset.flipped = '1';\n          if (backEl.dataset.flipPos) img.style.objectPosition = backEl.dataset.flipPos;\n          fade(backEl.getAttribute('src'));\n          if (chip) chip.textContent = 'Tap for front';\n        }\n      };\n      img.addEventListener('click', toggle);\n      img.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); } });\n    });\n\n    const drop = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 1).getTime();\n    const pad = n => String(n).padStart(2, '0');\n    this._tick = () => {\n      let diff = Math.max(0, drop - Date.now());\n      const d = Math.floor(diff / 864e5); diff -= d * 864e5;\n      const h = Math.floor(diff / 36e5); diff -= h * 36e5;\n      const m = Math.floor(diff / 6e4); diff -= m * 6e4;\n      const s = Math.floor(diff / 1e3);\n      this.setState({ cd: { d: pad(d), h: pad(h), m: pad(m), s: pad(s) } });\n    };\n    this._tick();\n    this._cd = setInterval(this._tick, 1000);\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this._onScroll);\n    clearInterval(this._cd);\n    window.removeEventListener('scroll', this._revealCheck);\n    window.removeEventListener('resize', this._revealCheck);\n  }\n\n  submit(which, e) {\n    e.preventDefault();\n    const input = e.target.querySelector('input');\n    const email = (input.value || '').trim();\n    if (!email) return;\n    try {\n      const list = JSON.parse(localStorage.getItem('mood_waitlist') || '[]');\n      if (!list.includes(email)) { list.push(email); localStorage.setItem('mood_waitlist', JSON.stringify(list)); }\n    } catch (_) {}\n    input.value = '';\n    if (which === 'hero') this.setState({ heroNote: \"You're on the list ✓\" });\n    else this.setState({ ctaNote: \"You're on the list ✓ — see you at the drop.\" });\n  }\n\n  renderVals() {\n    return {\n      dropName: this.props.dropName || 'Drop 01',\n      showKanji: this.props.showKanjiBg !== false,\n      cd: this.state.cd,\n      heroNote: this.state.heroNote,\n      ctaNote: this.state.ctaNote,\n      submitHero: (e) => this.submit('hero', e),\n      submitCta: (e) => this.submit('cta', e),\n      year: new Date().getFullYear(),\n      headerRef: this.headerRef\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
